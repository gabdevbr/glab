# Glab — system nginx site config
# Install: sudo cp /home/geovendas/glab/nginx/glab-site.conf /etc/nginx/sites-enabled/glab
# Then: sudo nginx -t && sudo systemctl reload nginx

upstream glab_api {
    server 127.0.0.1:8081;
}

upstream glab_web {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name glab.geovendas.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name glab.geovendas.local;

    ssl_certificate     /etc/nginx/ssl/glab.crt;
    ssl_certificate_key /etc/nginx/ssl/glab.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # API
    location /api/ {
        proxy_pass http://glab_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://glab_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check
    location /health {
        proxy_pass http://glab_api;
    }

    # Frontend
    location / {
        proxy_pass http://glab_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
