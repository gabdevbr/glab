services:
  glab-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glab-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@glab-postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://glab-redis:6379
    volumes:
      - glab-uploads:/data/uploads
    ports:
      - "127.0.0.1:8081:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      glab-postgres:
        condition: service_healthy
      glab-redis:
        condition: service_healthy

  glab-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://glab.geovendas.local}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://glab.geovendas.local}
    container_name: glab-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://glab.geovendas.local}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://glab.geovendas.local}
    ports:
      - "127.0.0.1:3001:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      - glab-api

  glab-postgres:
    image: postgres:16-alpine
    container_name: glab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glab}
      POSTGRES_DB: ${POSTGRES_DB:-glab}
    volumes:
      - glab-pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  glab-redis:
    image: redis:7-alpine
    container_name: glab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - glab-redis:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  glab-pgdata:
  glab-redis:
  glab-uploads:
