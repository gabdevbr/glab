services:
  glab-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glab-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ibtech

  glab-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glab-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    depends_on:
      - glab-api
    networks:
      - ibtech

  postgres:
    image: postgres:16-alpine
    container_name: glab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glab}
      POSTGRES_DB: ${POSTGRES_DB:-glab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glab}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ibtech

  redis:
    image: redis:7-alpine
    container_name: glab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ibtech

  nginx:
    image: nginx:alpine
    container_name: glab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/glab.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/uploads:ro
    depends_on:
      - glab-api
      - glab-web
    networks:
      - ibtech

volumes:
  pgdata:
  redis-data:
  uploads:

networks:
  ibtech:
    external: true
